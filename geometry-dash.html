<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Dash</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #gameContainer {
            position: relative;
            width: 900px;
            height: 500px;
            border: 3px solid #00ffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }

        canvas {
            display: block;
            background: #1a1a2e;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #score {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }

        #attempts {
            position: absolute;
            top: 15px;
            left: 20px;
            color: #aaa;
            font-size: 16px;
        }

        #progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        #startScreen, #deathScreen, #winScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 30, 0.92);
            pointer-events: all;
            z-index: 10;
        }

        #deathScreen, #winScreen {
            display: none;
        }

        .screen-title {
            font-size: 52px;
            font-weight: 900;
            background: linear-gradient(135deg, #00ffff, #ff00ff, #ffff00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .screen-subtitle {
            color: #888;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .screen-btn {
            padding: 14px 50px;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid #00ffff;
            background: transparent;
            color: #00ffff;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            pointer-events: all;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .screen-btn:hover {
            background: #00ffff;
            color: #0a0a0a;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.6);
        }

        .death-text {
            font-size: 42px;
            font-weight: 900;
            color: #ff4444;
            text-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
            margin-bottom: 10px;
        }

        .win-text {
            font-size: 42px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .stat-text {
            color: #ccc;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .spacer {
            height: 20px;
        }

        #difficulty-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        .diff-btn {
            padding: 8px 20px;
            font-size: 14px;
            border: 2px solid #555;
            background: transparent;
            color: #888;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            pointer-events: all;
        }

        .diff-btn.active {
            border-color: #00ffff;
            color: #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .diff-btn:hover {
            border-color: #00ffff;
            color: #00ffff;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="900" height="500"></canvas>
        <div id="ui-overlay">
            <div id="progress-bar" style="width: 0%"></div>
            <div id="score">0%</div>
            <div id="attempts">Intento 1</div>
        </div>

        <div id="startScreen">
            <div class="screen-title">GEOMETRY DASH</div>
            <div class="screen-subtitle">Toca o presiona espacio para saltar</div>
            <div id="difficulty-selector">
                <button class="diff-btn active" data-diff="easy">Fácil</button>
                <button class="diff-btn" data-diff="normal">Normal</button>
                <button class="diff-btn" data-diff="hard">Difícil</button>
            </div>
            <button class="screen-btn" id="startBtn">Jugar</button>
        </div>

        <div id="deathScreen">
            <div class="death-text">¡CRASH!</div>
            <div class="stat-text" id="deathProgress">Progreso: 0%</div>
            <div class="stat-text" id="deathAttempt">Intento: 1</div>
            <div class="spacer"></div>
            <button class="screen-btn" id="retryBtn">Reintentar</button>
        </div>

        <div id="winScreen">
            <div class="win-text">¡NIVEL COMPLETADO!</div>
            <div class="stat-text" id="winAttempts">Intentos: 1</div>
            <div class="spacer"></div>
            <button class="screen-btn" id="winRetryBtn">Jugar de nuevo</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;

    // ========== GAME CONFIG ==========
    const GROUND_Y = H - 80;
    const PLAYER_SIZE = 38;
    const GRAVITY = 0.7;
    const JUMP_FORCE = -12.5;
    const BASE_SPEED = 6;

    const DIFFICULTIES = {
        easy:   { speed: 5,   gapMultiplier: 1.6, label: 'Fácil' },
        normal: { speed: 6.5, gapMultiplier: 1.2, label: 'Normal' },
        hard:   { speed: 8.5, gapMultiplier: 0.9, label: 'Difícil' }
    };

    let difficulty = 'normal';
    let gameSpeed = BASE_SPEED;

    // ========== COLORS & THEMES ==========
    const NEON_COLORS = ['#00ffff', '#ff00ff', '#ffff00', '#00ff88', '#ff6644', '#44aaff'];
    const BG_STARS = [];
    for (let i = 0; i < 120; i++) {
        BG_STARS.push({
            x: Math.random() * W * 5,
            y: Math.random() * (GROUND_Y - 30),
            size: Math.random() * 2 + 0.5,
            brightness: Math.random()
        });
    }

    // ========== LEVEL GENERATION ==========
    function generateLevel() {
        const diff = DIFFICULTIES[difficulty];
        gameSpeed = diff.speed;
        const obstacles = [];
        const decorations = [];
        let x = 800;
        const totalLength = 6000;

        const patterns = [
            // Single spike
            (startX) => {
                obstacles.push({ type: 'spike', x: startX, y: GROUND_Y, w: 36, h: 40 });
                return 36;
            },
            // Double spike
            (startX) => {
                obstacles.push({ type: 'spike', x: startX, y: GROUND_Y, w: 36, h: 40 });
                obstacles.push({ type: 'spike', x: startX + 38, y: GROUND_Y, w: 36, h: 40 });
                return 74;
            },
            // Triple spike
            (startX) => {
                obstacles.push({ type: 'spike', x: startX, y: GROUND_Y, w: 36, h: 40 });
                obstacles.push({ type: 'spike', x: startX + 38, y: GROUND_Y, w: 36, h: 40 });
                obstacles.push({ type: 'spike', x: startX + 76, y: GROUND_Y, w: 36, h: 40 });
                return 112;
            },
            // Block
            (startX) => {
                obstacles.push({ type: 'block', x: startX, y: GROUND_Y - 45, w: 45, h: 45 });
                return 45;
            },
            // Tall block
            (startX) => {
                obstacles.push({ type: 'block', x: startX, y: GROUND_Y - 80, w: 45, h: 80 });
                return 45;
            },
            // Block + spike on top
            (startX) => {
                obstacles.push({ type: 'block', x: startX, y: GROUND_Y - 45, w: 60, h: 45 });
                obstacles.push({ type: 'spike', x: startX + 12, y: GROUND_Y - 45, w: 36, h: 36 });
                return 60;
            },
            // Platform gap (jump over pit)
            (startX) => {
                obstacles.push({ type: 'pit', x: startX, y: GROUND_Y, w: 100, h: 80 });
                return 100;
            },
            // Step blocks
            (startX) => {
                obstacles.push({ type: 'block', x: startX, y: GROUND_Y - 40, w: 40, h: 40 });
                obstacles.push({ type: 'block', x: startX + 50, y: GROUND_Y - 75, w: 40, h: 75 });
                return 90;
            }
        ];

        while (x < totalLength) {
            const patternIdx = Math.floor(Math.random() * patterns.length);
            // Hard patterns only on higher difficulties
            const maxPatterns = difficulty === 'easy' ? 5 : patterns.length;
            const chosenIdx = Math.floor(Math.random() * maxPatterns);
            const patternWidth = patterns[chosenIdx](x);
            const gap = (80 + Math.random() * 120) * diff.gapMultiplier;
            x += patternWidth + gap;

            // Decorations
            if (Math.random() < 0.3) {
                decorations.push({
                    x: x - gap / 2,
                    y: 50 + Math.random() * 150,
                    type: 'ring',
                    color: NEON_COLORS[Math.floor(Math.random() * NEON_COLORS.length)]
                });
            }
        }

        return { obstacles, decorations, totalLength };
    }

    // ========== PARTICLES ==========
    class Particle {
        constructor(x, y, color, type = 'trail') {
            this.x = x;
            this.y = y;
            this.color = color;
            this.type = type;
            if (type === 'trail') {
                this.vx = (Math.random() - 0.5) * 2 - 1;
                this.vy = (Math.random() - 0.5) * 2;
                this.life = 1;
                this.decay = 0.03 + Math.random() * 0.03;
                this.size = 3 + Math.random() * 4;
            } else { // explosion
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 6;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1;
                this.decay = 0.015 + Math.random() * 0.02;
                this.size = 3 + Math.random() * 6;
            }
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life -= this.decay;
            if (this.type === 'explosion') {
                this.vy += 0.1;
            }
        }
        draw(ctx) {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
            ctx.globalAlpha = 1;
        }
    }

    // ========== GAME STATE ==========
    let state = 'start'; // start, playing, dead, win
    let player, camera, level, particles, attempts, score, frameCount;
    let shakeTimer = 0;
    let shakeIntensity = 0;
    let playerRotation = 0;
    let jumpPressed = false;
    let bgHue = 0;

    function initGame() {
        player = {
            x: 120,
            y: GROUND_Y - PLAYER_SIZE,
            vy: 0,
            onGround: true,
            color: '#00ffff'
        };
        camera = { x: 0 };
        level = generateLevel();
        particles = [];
        score = 0;
        frameCount = 0;
        playerRotation = 0;
        shakeTimer = 0;
    }

    attempts = 1;
    initGame();

    // ========== INPUT ==========
    function handleJump() {
        if (state === 'playing' && player.onGround) {
            player.vy = JUMP_FORCE;
            player.onGround = false;
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.code === 'ArrowUp') {
            e.preventDefault();
            handleJump();
        }
    });

    canvas.addEventListener('mousedown', handleJump);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleJump(); });

    // UI buttons
    document.getElementById('startBtn').addEventListener('click', () => {
        state = 'playing';
        attempts = 1;
        initGame();
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('attempts').textContent = `Intento ${attempts}`;
    });

    document.getElementById('retryBtn').addEventListener('click', () => {
        attempts++;
        initGame();
        state = 'playing';
        document.getElementById('deathScreen').style.display = 'none';
        document.getElementById('attempts').textContent = `Intento ${attempts}`;
    });

    document.getElementById('winRetryBtn').addEventListener('click', () => {
        attempts = 1;
        initGame();
        state = 'playing';
        document.getElementById('winScreen').style.display = 'none';
        document.getElementById('attempts').textContent = `Intento ${attempts}`;
    });

    // Difficulty selector
    document.querySelectorAll('.diff-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            difficulty = btn.dataset.diff;
        });
    });

    // ========== COLLISION ==========
    function checkCollision(px, py, pw, ph, obs) {
        if (obs.type === 'spike') {
            // Triangle collision (simplified with inner rect)
            const cx = obs.x - camera.x + obs.w / 2;
            const cy = obs.y - obs.h;
            const margin = 8;
            return px + pw > cx - obs.w / 2 + margin &&
                   px < cx + obs.w / 2 - margin &&
                   py + ph > cy + margin &&
                   py < obs.y;
        } else if (obs.type === 'block') {
            return px + pw > obs.x - camera.x + 3 &&
                   px < obs.x - camera.x + obs.w - 3 &&
                   py + ph > obs.y &&
                   py < obs.y + obs.h;
        } else if (obs.type === 'pit') {
            // Player falls into pit
            return px + pw > obs.x - camera.x + 10 &&
                   px < obs.x - camera.x + obs.w - 10 &&
                   py + ph >= GROUND_Y - 2;
        }
        return false;
    }

    // ========== DRAWING ==========
    function drawBackground() {
        bgHue = (bgHue + 0.1) % 360;
        const gradient = ctx.createLinearGradient(0, 0, 0, H);
        gradient.addColorStop(0, `hsl(${bgHue % 360}, 40%, 8%)`);
        gradient.addColorStop(0.5, `hsl(${(bgHue + 30) % 360}, 30%, 12%)`);
        gradient.addColorStop(1, `hsl(${(bgHue + 60) % 360}, 35%, 10%)`);
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, W, H);

        // Stars
        ctx.fillStyle = '#fff';
        for (const star of BG_STARS) {
            const sx = ((star.x - camera.x * 0.3) % (W * 2) + W * 2) % (W * 2);
            if (sx < W) {
                ctx.globalAlpha = 0.3 + star.brightness * 0.5 + Math.sin(frameCount * 0.02 + star.x) * 0.2;
                ctx.fillRect(sx, star.y, star.size, star.size);
            }
        }
        ctx.globalAlpha = 1;
    }

    function drawGround() {
        // Main ground
        const groundGrad = ctx.createLinearGradient(0, GROUND_Y, 0, H);
        groundGrad.addColorStop(0, '#222244');
        groundGrad.addColorStop(1, '#111122');
        ctx.fillStyle = groundGrad;
        ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

        // Ground line
        ctx.strokeStyle = '#00ffff44';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, GROUND_Y);
        ctx.lineTo(W, GROUND_Y);
        ctx.stroke();

        // Grid on ground
        ctx.strokeStyle = '#ffffff08';
        ctx.lineWidth = 1;
        const gridSize = 40;
        const offsetX = (camera.x * gameSpeed) % gridSize;
        for (let gx = -offsetX; gx < W; gx += gridSize) {
            ctx.beginPath();
            ctx.moveTo(gx, GROUND_Y);
            ctx.lineTo(gx, H);
            ctx.stroke();
        }
        for (let gy = GROUND_Y; gy < H; gy += gridSize) {
            ctx.beginPath();
            ctx.moveTo(0, gy);
            ctx.lineTo(W, gy);
            ctx.stroke();
        }
    }

    function drawSpike(x, y, w, h, color = '#ffffff') {
        const sx = x - camera.x;
        ctx.save();
        // Glow
        ctx.shadowColor = color;
        ctx.shadowBlur = 12;
        // Main spike
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(sx, y);
        ctx.lineTo(sx + w / 2, y - h);
        ctx.lineTo(sx + w, y);
        ctx.closePath();
        ctx.fill();
        // Inner lighter triangle
        ctx.fillStyle = '#ffffff44';
        ctx.beginPath();
        ctx.moveTo(sx + w * 0.25, y);
        ctx.lineTo(sx + w / 2, y - h * 0.6);
        ctx.lineTo(sx + w * 0.75, y);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    }

    function drawBlock(x, y, w, h) {
        const sx = x - camera.x;
        ctx.save();
        ctx.shadowColor = '#ff00ff';
        ctx.shadowBlur = 10;
        // Block body
        const grad = ctx.createLinearGradient(sx, y, sx, y + h);
        grad.addColorStop(0, '#6a0dad');
        grad.addColorStop(1, '#3a0066');
        ctx.fillStyle = grad;
        ctx.fillRect(sx, y, w, h);
        // Border
        ctx.strokeStyle = '#ff00ff88';
        ctx.lineWidth = 2;
        ctx.strokeRect(sx, y, w, h);
        // Inner cross pattern
        ctx.strokeStyle = '#ff00ff33';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(sx, y);
        ctx.lineTo(sx + w, y + h);
        ctx.moveTo(sx + w, y);
        ctx.lineTo(sx, y + h);
        ctx.stroke();
        ctx.restore();
    }

    function drawPit(x, y, w) {
        const sx = x - camera.x;
        // Dark pit
        ctx.fillStyle = '#000';
        ctx.fillRect(sx, y, w, H - y);
        // Warning stripes
        ctx.fillStyle = '#ff440033';
        for (let i = 0; i < w; i += 20) {
            ctx.fillRect(sx + i, y, 10, 4);
        }
    }

    function drawPlayer() {
        const px = player.x;
        const py = player.y;
        const s = PLAYER_SIZE;

        ctx.save();
        ctx.translate(px + s / 2, py + s / 2);
        ctx.rotate(playerRotation);

        // Glow
        ctx.shadowColor = player.color;
        ctx.shadowBlur = 20;

        // Main body
        const grad = ctx.createLinearGradient(-s / 2, -s / 2, s / 2, s / 2);
        grad.addColorStop(0, '#00ffff');
        grad.addColorStop(1, '#0088aa');
        ctx.fillStyle = grad;
        ctx.fillRect(-s / 2, -s / 2, s, s);

        // Border
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 2;
        ctx.strokeRect(-s / 2, -s / 2, s, s);

        // Eye
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        ctx.fillRect(4, -10, 14, 14);
        ctx.fillStyle = '#000';
        ctx.fillRect(10, -7, 8, 8);
        ctx.fillStyle = '#fff';
        ctx.fillRect(13, -5, 3, 3);

        ctx.restore();
    }

    function drawDecorations() {
        for (const dec of level.decorations) {
            const dx = dec.x - camera.x;
            if (dx < -50 || dx > W + 50) continue;

            if (dec.type === 'ring') {
                ctx.strokeStyle = dec.color;
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.4 + Math.sin(frameCount * 0.05 + dec.x) * 0.2;
                ctx.beginPath();
                ctx.arc(dx, dec.y, 15, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }
    }

    function drawParticles() {
        for (const p of particles) {
            p.draw(ctx);
        }
    }

    // ========== UPDATE ==========
    function update() {
        if (state !== 'playing') return;

        frameCount++;

        // Move player forward (camera)
        camera.x += gameSpeed;

        // Gravity
        player.vy += GRAVITY;
        player.y += player.vy;

        // Ground collision
        let onPit = false;
        for (const obs of level.obstacles) {
            if (obs.type === 'pit') {
                const sx = obs.x - camera.x;
                if (player.x + PLAYER_SIZE > sx + 10 && player.x < sx + obs.w - 10) {
                    onPit = true;
                    break;
                }
            }
        }

        if (!onPit && player.y + PLAYER_SIZE >= GROUND_Y) {
            player.y = GROUND_Y - PLAYER_SIZE;
            player.vy = 0;
            player.onGround = true;
        } else if (onPit && player.y + PLAYER_SIZE >= GROUND_Y) {
            // Falling into pit
            die();
            return;
        }

        // Block top collision (land on blocks)
        for (const obs of level.obstacles) {
            if (obs.type === 'block') {
                const sx = obs.x - camera.x;
                if (player.x + PLAYER_SIZE > sx + 3 && player.x < sx + obs.w - 3) {
                    // Landing on top
                    if (player.vy > 0 && player.y + PLAYER_SIZE >= obs.y && player.y + PLAYER_SIZE <= obs.y + 15) {
                        player.y = obs.y - PLAYER_SIZE;
                        player.vy = 0;
                        player.onGround = true;
                    }
                    // Hitting side
                    else if (player.y + PLAYER_SIZE > obs.y + 5 && player.y < obs.y + obs.h - 5) {
                        die();
                        return;
                    }
                }
            }
        }

        // Rotation while in air
        if (!player.onGround) {
            playerRotation += 0.08;
        } else {
            // Snap to nearest 90 degrees
            const target = Math.round(playerRotation / (Math.PI / 2)) * (Math.PI / 2);
            playerRotation += (target - playerRotation) * 0.3;
        }

        // Spike collision
        for (const obs of level.obstacles) {
            if (obs.type === 'spike') {
                if (checkCollision(player.x, player.y, PLAYER_SIZE, PLAYER_SIZE, obs)) {
                    die();
                    return;
                }
            }
        }

        // Trail particles
        if (frameCount % 2 === 0) {
            particles.push(new Particle(
                player.x - 5,
                player.y + PLAYER_SIZE / 2 + (Math.random() - 0.5) * 10,
                player.onGround ? '#00ffff' : '#ff00ff',
                'trail'
            ));
        }

        // Update particles
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            if (particles[i].life <= 0) particles.splice(i, 1);
        }

        // Keep particles manageable
        if (particles.length > 200) particles.splice(0, 50);

        // Progress & score
        score = Math.min(100, Math.floor((camera.x / level.totalLength) * 100));
        document.getElementById('score').textContent = score + '%';
        document.getElementById('progress-bar').style.width = score + '%';

        // Win condition
        if (camera.x >= level.totalLength) {
            state = 'win';
            document.getElementById('winScreen').style.display = 'flex';
            document.getElementById('winAttempts').textContent = `Intentos: ${attempts}`;
        }

        // Screen shake
        if (shakeTimer > 0) shakeTimer--;

        // Falling off screen
        if (player.y > H + 100) {
            die();
        }
    }

    function die() {
        state = 'dead';
        // Explosion particles
        for (let i = 0; i < 40; i++) {
            particles.push(new Particle(
                player.x + PLAYER_SIZE / 2,
                player.y + PLAYER_SIZE / 2,
                NEON_COLORS[Math.floor(Math.random() * NEON_COLORS.length)],
                'explosion'
            ));
        }
        shakeTimer = 15;
        shakeIntensity = 8;

        setTimeout(() => {
            document.getElementById('deathScreen').style.display = 'flex';
            document.getElementById('deathProgress').textContent = `Progreso: ${score}%`;
            document.getElementById('deathAttempt').textContent = `Intento: ${attempts}`;
        }, 600);
    }

    // ========== RENDER ==========
    function render() {
        ctx.save();

        // Screen shake
        if (shakeTimer > 0) {
            const sx = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 15);
            const sy = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 15);
            ctx.translate(sx, sy);
        }

        drawBackground();
        drawGround();
        drawDecorations();

        // Draw obstacles
        for (const obs of level.obstacles) {
            const sx = obs.x - camera.x;
            if (sx < -100 || sx > W + 100) continue;

            if (obs.type === 'spike') {
                drawSpike(obs.x, obs.y, obs.w, obs.h, '#ff4444');
            } else if (obs.type === 'block') {
                drawBlock(obs.x, obs.y, obs.w, obs.h);
            } else if (obs.type === 'pit') {
                drawPit(obs.x, obs.y, obs.w);
            }
        }

        drawParticles();

        if (state === 'playing' || state === 'dead') {
            if (state === 'playing') drawPlayer();
        }

        ctx.restore();
    }

    // ========== GAME LOOP ==========
    function gameLoop() {
        update();
        render();
        requestAnimationFrame(gameLoop);
    }

    gameLoop();
    </script>
</body>
</html>
